<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Edu - Công cụ tạo đề Listening</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #2980b9; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 120px; }
        button { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2196f3; }
        .success { display: none; margin-top: 20px; padding: 15px; background: #d4edda; color: #155724; border-radius: 6px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Easy Edu Generator</h1>
    <p style="text-align: center; color: #7f8c8d;">Dành cho giáo viên toàn trung tâm</p>
    
    <label>1. Tên giáo viên:</label>
    <select id="teacherSelect">
        <option value="Thầy Nam (Easy Edu)">Thầy Nam (Easy Edu)</option>
        <option value="Giáo viên khác...">Giáo viên khác...</option>
    </select>
    <input type="text" id="teacherCustom" placeholder="Nhập tên giáo viên khác..." style="display:none; margin-top:10px;">

    <label>2. Tên bài bài tập:</label>
    <input type="text" id="testName" placeholder="Ví dụ: Listening Test 01 - Part 1">

    <label>3. Nội dung Audio Script (Tiếng Anh):</label>
    <textarea id="scriptInput" placeholder="Dán kịch bản vào đây..."></textarea>

    <label>4. Số lượng lỗ đục:</label>
    <input type="number" id="gapCount" value="10" min="1">

    <label>5. Web App URL (Dán link từ Google Sheets):</label>
   <input type="text" id="sheetUrl" value="https://script.google.com/macros/s/AKfycby4sk9xnNXe2BMs35n1ZG26wtL38SQMz5RB-gq96MimVilXWG1QNQz3Xim6sUeAyTs8/exec" style="background:#e8f0fe;" readonly>

    <button onclick="createTest()">LƯU ĐỀ VÀO HỆ THỐNG</button>

    <div id="msg" class="success">🎉 Đã lưu đề thành công! Hãy vào link quản lý trên Sheets để lấy link gửi học sinh.</div>
</div>

<script>
    // Logic ẩn hiện ô nhập tên giáo viên khác
    document.getElementById('teacherSelect').addEventListener('change', function() {
        document.getElementById('teacherCustom').style.display = (this.value === 'Giáo viên khác...') ? 'block' : 'none';
    });

  function createTest() {
        const btn = document.querySelector('button');
        const url = document.getElementById('sheetUrl').value.trim();
        let teacher = document.getElementById('teacherSelect').value;
        if (teacher === 'Giáo viên khác...') teacher = document.getElementById('teacherCustom').value.trim();

        const testName = document.getElementById('testName').value.trim();
        const script = document.getElementById('scriptInput').value.trim();
        const gaps = document.getElementById('gapCount').value;

        // KIỂM TRA CHI TIẾT XEM THIẾU THÔNG TIN NÀO
        let missing = [];
        if (!testName) missing.push("Tên bài bài tập");
        if (!script) missing.push("Nội dung Audio Script");
        if (!url) missing.push("Web App URL (Link Google Sheets)");
        if (teacher === 'Giáo viên khác...' && !teacher) missing.push("Tên giáo viên tùy chỉnh");

        if (missing.length > 0) {
            return alert("Hệ thống phát hiện bạn chưa điền đủ:\n- " + missing.join("\n- "));
        }

        const payload = {
            action: "saveTest",
            teacher: teacher,
            name: testName,
            script: script,
            gaps: gaps
        };

        btn.innerText = "Đang lưu...";
        btn.disabled = true;

  // Gửi dữ liệu thẳng lên Google Sheets
        fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8", // <-- Thêm dòng này để chống lỗi CORS
            },
            body: JSON.stringify(payload)
        })
        .then(response => response.json()) // <-- Thêm dòng này để đọc phản hồi
        .then(data => {
            document.getElementById('msg').style.display = 'block';
            btn.innerText = "LƯU ĐỀ VÀO HỆ THỐNG";
            btn.disabled = false;
            document.getElementById('scriptInput').value = ""; // Xóa kịch bản cũ
        })
        .catch(err => {
            alert("Lỗi kết nối! Vui lòng kiểm tra lại mạng hoặc Web App URL.");
            console.error(err); // In lỗi ra F12 để dễ dò
            btn.innerText = "LƯU ĐỀ VÀO HỆ THỐNG";
            btn.disabled = false;
        });
